name: Build Test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "packages/sveltekit/**"
      - "test/**"
  pull_request:
    branches: [main, master]
    paths:
      - "packages/sveltekit/**"
      - "test/**"

jobs:
  build-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build adapter package
        run: |
          cd packages/sveltekit
          bun install
          bun run build
          bun link

      - name: Build test project
        run: |
          cd test
          bun install
          bun run build
          bun link sveltekit-exec-adapter

      - name: Test executable
        run: |
          cd test
          chmod +x dist/test-example
          ./dist/test-example &
          sleep 5
          curl -f http://localhost:3000 || exit 1
          pkill -f test-example
        shell: bash

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: test-example-linux-x64
          path: test/dist/test-example
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: test-example-macos-${{ runner.arch }}
          path: test/dist/test-example
          retention-days: 30

      - name: Display build information
        run: |
          echo "Build Summary"
          echo "=============="
          echo "Platform: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"
          ls -lh test/dist/test-example
        shell: bash
